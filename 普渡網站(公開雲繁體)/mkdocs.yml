site_name: Pudu Cloud API 說明書
site_description: 普渡雲開放平臺 API 技術文件
docs_dir: docs
theme:
  name: material
  language: zh
  palette:
  - scheme: default
    primary: blue
    accent: blue
    toggle:
      icon: material/brightness-7
      name: 切換至深色模式
  - scheme: slate
    primary: blue
    accent: blue
    toggle:
      icon: material/brightness-4
      name: 切換至淺色模式
  features:
  - navigation.tabs
  - navigation.sections
  - navigation.top
  - search.highlight
  - search.share
  - content.code.copy
markdown_extensions:
- pymdownx.highlight:
    anchor_linenums: true
    linenums: true
- pymdownx.superfences
- pymdownx.tabbed:
    alternate_style: true
- tables
- toc:
    permalink: true
extra_css:
- stylesheets/extra.css
